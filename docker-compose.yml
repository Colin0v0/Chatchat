services:
  backend:
    build:
      context: ./backend
    container_name: chatchat-backend
    env_file:
      - ./backend/.env
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - backend-storage:/app/storage
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: chatchat-frontend
    depends_on:
      - backend
    ports:
      - "3300:80"
    restart: unless-stopped

volumes:
  backend-storage:
